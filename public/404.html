<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script>
      const path = location.pathname;
      const repo = "/prof-test";

      if (path.startsWith(repo)) {
        sessionStorage.redirect = path.replace(repo, "") + location.search;
        location.replace(repo + "/");
      } else {
        location.replace(repo + "/");
      }
    </script>
  </head>
  <body></body>
</html>
